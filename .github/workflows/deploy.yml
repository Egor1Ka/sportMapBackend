name: Deploy

on:
  push:
    branches: [main]
  workflow_dispatch:

env:
  IMAGE_NAME: ghcr.io/egor1ka/sportmapbackend

jobs:
  build-and-push:
    name: Build & push image
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4

      - uses: docker/setup-buildx-action@v3

      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: |
            ${{ env.IMAGE_NAME }}:latest
            ${{ env.IMAGE_NAME }}:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  deploy:
    name: Deploy to VPS
    needs: build-and-push
    runs-on: ubuntu-latest
    steps:
      - name: Write .env.api, pull image and restart api
        uses: appleboy/ssh-action@v1
        env:
          BASE_URL: ${{ secrets.BASE_URL }}
          FRONTEND_URL: ${{ secrets.FRONTEND_URL }}
          DB_URL: ${{ secrets.DB_URL }}
          GOOGLE_CLIENT_ID: ${{ secrets.GOOGLE_CLIENT_ID }}
          GOOGLE_CLIENT_SECRET: ${{ secrets.GOOGLE_CLIENT_SECRET }}
          JWT_SECRET: ${{ secrets.JWT_SECRET }}
          ACCESS_TOKEN_EXPIRES: ${{ secrets.ACCESS_TOKEN_EXPIRES }}
          REFRESH_TOKEN_DAYS: ${{ secrets.REFRESH_TOKEN_DAYS }}
          COOKIE_SECURE: ${{ secrets.COOKIE_SECURE }}
          COOKIE_SAME_SITE: ${{ secrets.COOKIE_SAME_SITE }}
          COOKIE_MAX_AGE_ACCESS_MS: ${{ secrets.COOKIE_MAX_AGE_ACCESS_MS }}
          COOKIE_MAX_AGE_REFRESH_MS: ${{ secrets.COOKIE_MAX_AGE_REFRESH_MS }}
          CREEM_SECRET_KEY: ${{ secrets.CREEM_SECRET_KEY }}
          CREEM_WEBHOOK_SECRET: ${{ secrets.CREEM_WEBHOOK_SECRET }}
          CREEM_PRODUCT_ID: ${{ secrets.CREEM_PRODUCT_ID }}
          CREEM_SERVER_IDX: ${{ secrets.CREEM_SERVER_IDX }}
          CLOUDINARY_CLOUD_NAME: ${{ secrets.CLOUDINARY_CLOUD_NAME }}
          CLOUDINARY_API_KEY: ${{ secrets.CLOUDINARY_API_KEY }}
          CLOUDINARY_API_SECRET: ${{ secrets.CLOUDINARY_API_SECRET }}
          ADMIN_IDS: ${{ secrets.ADMIN_IDS }}
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          envs: BASE_URL,FRONTEND_URL,DB_URL,GOOGLE_CLIENT_ID,GOOGLE_CLIENT_SECRET,JWT_SECRET,ACCESS_TOKEN_EXPIRES,REFRESH_TOKEN_DAYS,COOKIE_SECURE,COOKIE_SAME_SITE,COOKIE_MAX_AGE_ACCESS_MS,COOKIE_MAX_AGE_REFRESH_MS,CREEM_SECRET_KEY,CREEM_WEBHOOK_SECRET,CREEM_PRODUCT_ID,CREEM_SERVER_IDX,CLOUDINARY_CLOUD_NAME,CLOUDINARY_API_KEY,CLOUDINARY_API_SECRET,ADMIN_IDS
          script: |
            mkdir -p /opt/sportmap
            cat > /opt/sportmap/.env.api <<EOF
            PORT=9000
            API_PREFIX=/api
            BASE_URL=$BASE_URL
            FRONTEND_URL=$FRONTEND_URL
            DB_URL=$DB_URL
            GOOGLE_CLIENT_ID=$GOOGLE_CLIENT_ID
            GOOGLE_CLIENT_SECRET=$GOOGLE_CLIENT_SECRET
            JWT_SECRET=$JWT_SECRET
            ACCESS_TOKEN_EXPIRES=$ACCESS_TOKEN_EXPIRES
            REFRESH_TOKEN_DAYS=$REFRESH_TOKEN_DAYS
            COOKIE_DOMAIN=
            COOKIE_SECURE=$COOKIE_SECURE
            COOKIE_SAME_SITE=$COOKIE_SAME_SITE
            COOKIE_MAX_AGE_ACCESS_MS=$COOKIE_MAX_AGE_ACCESS_MS
            COOKIE_MAX_AGE_REFRESH_MS=$COOKIE_MAX_AGE_REFRESH_MS
            CREEM_SECRET_KEY=$CREEM_SECRET_KEY
            CREEM_WEBHOOK_SECRET=$CREEM_WEBHOOK_SECRET
            CREEM_PRODUCT_ID=$CREEM_PRODUCT_ID
            CREEM_SERVER_IDX=$CREEM_SERVER_IDX
            CLOUDINARY_CLOUD_NAME=$CLOUDINARY_CLOUD_NAME
            CLOUDINARY_API_KEY=$CLOUDINARY_API_KEY
            CLOUDINARY_API_SECRET=$CLOUDINARY_API_SECRET
            ADMIN_IDS=$ADMIN_IDS
            EOF
            chmod 600 /opt/sportmap/.env.api
            cd /opt/sportmap
            docker compose -f docker-compose.prod.yml pull api
            docker compose -f docker-compose.prod.yml up -d --no-deps --force-recreate api
            docker image prune -f
