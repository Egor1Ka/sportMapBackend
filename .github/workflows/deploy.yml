name: Deploy

on:
  push:
    branches: [main]
  workflow_dispatch:

env:
  IMAGE_NAME: ghcr.io/egor1ka/slotx-backend

jobs:
  build-and-push:
    name: Build & push image
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4

      - uses: docker/setup-buildx-action@v3

      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: |
            ${{ env.IMAGE_NAME }}:latest
            ${{ env.IMAGE_NAME }}:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  deploy:
    name: Deploy to VPS
    needs: build-and-push
    runs-on: ubuntu-latest
    steps:
      - name: Sync .env.api on server
        uses: appleboy/ssh-action@v1
        env:
          DB_URL: ${{ secrets.DB_URL }}
          JWT_SECRET: ${{ secrets.JWT_SECRET }}
          GOOGLE_CLIENT_ID: ${{ secrets.GOOGLE_CLIENT_ID }}
          GOOGLE_CLIENT_SECRET: ${{ secrets.GOOGLE_CLIENT_SECRET }}
          CREEM_API_KEY: ${{ secrets.CREEM_API_KEY }}
          CREEM_WEBHOOK_SECRET: ${{ secrets.CREEM_WEBHOOK_SECRET }}
          CREEM_PRODUCT_PRO: ${{ secrets.CREEM_PRODUCT_PRO }}
          CREEM_PRODUCT_ORG_CREATOR: ${{ secrets.CREEM_PRODUCT_ORG_CREATOR }}
          CREEM_PRODUCT_EXPORT_PACK: ${{ secrets.CREEM_PRODUCT_EXPORT_PACK }}
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_BOT_USERNAME: ${{ secrets.TELEGRAM_BOT_USERNAME }}
          CLOUDINARY_CLOUD_NAME: ${{ secrets.CLOUDINARY_CLOUD_NAME }}
          CLOUDINARY_API_KEY: ${{ secrets.CLOUDINARY_API_KEY }}
          CLOUDINARY_API_SECRET: ${{ secrets.CLOUDINARY_API_SECRET }}
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          envs: DB_URL,JWT_SECRET,GOOGLE_CLIENT_ID,GOOGLE_CLIENT_SECRET,CREEM_API_KEY,CREEM_WEBHOOK_SECRET,CREEM_PRODUCT_PRO,CREEM_PRODUCT_ORG_CREATOR,CREEM_PRODUCT_EXPORT_PACK,TELEGRAM_BOT_TOKEN,TELEGRAM_BOT_USERNAME,CLOUDINARY_CLOUD_NAME,CLOUDINARY_API_KEY,CLOUDINARY_API_SECRET
          script: |
            mkdir -p /opt/slotix
            cat > /opt/slotix/.env.api <<EOF
            PORT=9000
            API_PREFIX=api
            FRONTEND_URL=https://slotixs.uk
            COOKIE_DOMAIN=slotixs.uk
            JWT_ACCESS_EXPIRES=30d
            JWT_REFRESH_EXPIRES=90d
            CREEM_TEST_MODE=true
            GOOGLE_REDIRECT_URI=https://slotixs.uk/api/auth/google/callback
            DB_URL=$DB_URL
            JWT_SECRET=$JWT_SECRET
            GOOGLE_CLIENT_ID=$GOOGLE_CLIENT_ID
            GOOGLE_CLIENT_SECRET=$GOOGLE_CLIENT_SECRET
            CREEM_API_KEY=$CREEM_API_KEY
            CREEM_WEBHOOK_SECRET=$CREEM_WEBHOOK_SECRET
            CREEM_PRODUCT_PRO=$CREEM_PRODUCT_PRO
            CREEM_PRODUCT_ORG_CREATOR=$CREEM_PRODUCT_ORG_CREATOR
            CREEM_PRODUCT_EXPORT_PACK=$CREEM_PRODUCT_EXPORT_PACK
            TELEGRAM_BOT_TOKEN=$TELEGRAM_BOT_TOKEN
            TELEGRAM_BOT_USERNAME=$TELEGRAM_BOT_USERNAME
            CLOUDINARY_CLOUD_NAME=$CLOUDINARY_CLOUD_NAME
            CLOUDINARY_API_KEY=$CLOUDINARY_API_KEY
            CLOUDINARY_API_SECRET=$CLOUDINARY_API_SECRET
            EOF
            chmod 600 /opt/slotix/.env.api

      - name: Pull image and restart api
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          script: |
            cd /opt/slotix
            docker compose -f docker-compose.prod.yml pull api
            docker compose -f docker-compose.prod.yml up -d api
            docker image prune -f
